spring.application.name=SmartHome
server.port=${PORT:${HTTP_PLATFORM_PORT:8080}}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger.html
spring.datasource.hikari.initialization-fail-timeout=-1
management.endpoints.web.exposure.include=health,info,scheduledtasks
smarthome.pet-feeder.scheduler.zone=Asia/Ho_Chi_Minh
smarthome.pet-feeder.scheduler.enabled=true
